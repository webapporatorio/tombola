<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tombola Live Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://tombola-53e42-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tabelloneRef = ref(db, 'tabellone');
        const ultimoRef = ref(db, 'ultimoEstratto');
        const premiRef = ref(db, 'premi');
        const annuncioRef = ref(db, 'annuncioAttivo');

        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        const isAdmin = !isMobile;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isTV = urlParams.get('view') === 'tv';

            renderTabellone(isTV);
            ascoltaCambiamenti(isTV);

            if (isAdmin && !isTV) {
                document.getElementById('admin-controls').classList.remove('hidden');
            }
            if (isTV) {
                document.getElementById('grid-container').classList.add('scale-110', 'mt-10');
            }
        };

        function renderTabellone(isTV) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            for (let i = 1; i <= 90; i++) {
                const node = document.createElement('div');
                node.id = `num-${i}`;
                node.className = "border h-12 flex items-center justify-center font-bold text-lg bg-white text-slate-900 rounded shadow-sm transition-all";
                node.innerText = i;
                if (isAdmin && !isTV) {
                    node.classList.add('cursor-pointer', 'hover:bg-yellow-100', 'active:scale-95');
                    node.onclick = () => toggleNumero(i);
                }
                container.appendChild(node);
            }
        }

        window.toggleNumero = (n) => {
            const el = document.getElementById(`num-${n}`);
            const isEstratto = el.classList.contains('bg-red-500');
            const nuovoStato = !isEstratto;
            update(tabelloneRef, { [n]: nuovoStato });
            if (nuovoStato) {
                set(ultimoRef, { valore: n, ts: Date.now() });
            }
        };

        window.resetPartita = () => {
            if(confirm("Vuoi azzerare il tabellone e i premi?")) {
                set(tabelloneRef, {});
                set(ultimoRef, { valore: null, ts: 0 });
                set(annuncioRef, { testo: null, ts: 0 });
                // Reset premi a 0 o al valore che desideri
                set(premiRef, { cinquine: 1, tombole: 1 });
            }
        };

        window.updatePremi = () => {
            const c = document.getElementById('input-cinquine').value;
            const t = document.getElementById('input-tombole').value;
            set(premiRef, { cinquine: parseInt(c), tombole: parseInt(t) });
        };

        window.annunciaPremio = (tipo) => {
            let msg = "";
            if(tipo === 'CINQUINA') msg = "CINQUINA FATTA!";
            if(tipo === 'TOMBOLA') msg = "TOMBOLA FATTA!";
            if(tipo === 'FINE') msg = "GIOCO TERMINATO";
            set(annuncioRef, { testo: msg, ts: Date.now() });

            if(tipo === 'CINQUINA' || tipo === 'TOMBOLA') {
                onValue(premiRef, (snap) => {
                    const attuali = snap.val() || { cinquine: 0, tombole: 0 };
                    if(tipo === 'CINQUINA' && attuali.cinquine > 0) {
                        update(premiRef, { cinquine: attuali.cinquine - 1 });
                    } else if(tipo === 'TOMBOLA' && attuali.tombole > 0) {
                        update(premiRef, { tombole: attuali.tombole - 1 });
                    }
                }, { onlyOnce: true });
            }
        };

        function ascoltaCambiamenti(isTV) {
            onValue(tabelloneRef, (snapshot) => {
                const numeri = snapshot.val() || {};
                for (let i = 1; i <= 90; i++) {
                    const el = document.getElementById(`num-${i}`);
                    if (numeri[i]) {
                        el.classList.replace('bg-white', 'bg-red-500');
                        el.classList.add('text-white');
                    } else {
                        el.classList.replace('bg-red-500', 'bg-white');
                        el.classList.remove('text-white');
                    }
                }
            });

            onValue(ultimoRef, (snapshot) => {
                const data = snapshot.val();
                if ((isMobile || isTV) && data && data.valore) {
                    const overlay = document.getElementById('overlay-estrazione');
                    document.getElementById('numero-grande').innerText = data.valore;
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    setTimeout(() => {
                        overlay.classList.replace('flex', 'hidden');
                    }, 4000);
                }
            });

            onValue(premiRef, (snapshot) => {
                const d = snapshot.val() || { cinquine: 0, tombole: 0 };
                document.getElementById('display-cinquine').innerText = d.cinquine;
                document.getElementById('display-tombole').innerText = d.tombole;
                if(isAdmin) {
                    document.getElementById('input-cinquine').value = d.cinquine;
                    document.getElementById('input-tombole').value = d.tombole;
                }
            });

            onValue(annuncioRef, (snapshot) => {
                const data = snapshot.val();
                if ((isMobile || isTV) && data && data.testo) {
                    const overlay = document.getElementById('overlay-premio');
                    document.getElementById('testo-premio-valore').innerText = data.testo;
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    if(data.testo !== "GIOCO TERMINATO") {
                        setTimeout(() => {
                            overlay.classList.replace('flex', 'hidden');
                        }, 6000);
                    }
                }
            });
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans overflow-x-hidden">

    <div id="overlay-estrazione" class="hidden fixed inset-0 z-50 bg-blue-600 flex-col items-center justify-center text-center p-6">
        <div class="bg-white text-blue-600 rounded-full px-8 py-2 mb-4 font-black uppercase tracking-widest shadow-2xl">
            È stato estratto il numero
        </div>
        <div id="numero-grande" class="text-[14rem] font-black text-white drop-shadow-2xl leading-none">--</div>
    </div>

    <div id="overlay-premio" class="hidden fixed inset-0 z-[60] bg-yellow-500 flex-col items-center justify-center text-center p-6 animate-pulse">
        <div class="text-2xl font-bold uppercase text-slate-900 tracking-widest">ANNUNCIO!</div>
        <div id="testo-premio-valore" class="text-6xl font-black text-white drop-shadow-lg my-4 italic">---</div>
        <button onclick="document.getElementById('overlay-premio').classList.replace('flex','hidden')" class="mt-8 bg-slate-900 text-white px-6 py-2 rounded-full font-bold">CHIUDI</button>
    </div>

    <div class="max-w-4xl mx-auto p-4">
        <header class="text-center mb-6">
    <h1 class="text-4xl font-black text-yellow-500 uppercase italic tracking-tighter drop-shadow-lg">
        TOMBOLA
    </h1>
    <p class="text-sm uppercase tracking-[0.3em] text-slate-400 font-light mt-1">
        Oratorio in Festa 2026
    </p>
    
    </header>
            
            <div id="admin-controls" class="hidden mt-4 p-4 bg-slate-800 rounded-xl border border-slate-700">
                <p class="text-green-400 font-mono text-xs mb-3 italic uppercase">Pannello Operatore</p>
                <button onclick="resetPartita()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-8 rounded-lg shadow-lg transition-all active:bg-red-800">
                    🔄 RESETTA TABELLONE
                </button>
                
                <div class="mt-4 grid grid-cols-2 gap-4 border-t border-slate-700 pt-4 text-left">
                    <div>
                        <label class="text-xs text-slate-400">N. Cinquine disponibili:</label>
                        <input type="number" id="input-cinquine" value="1" class="w-full bg-slate-700 p-1 rounded text-white" onchange="updatePremi()">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">N. Tombole disponibili:</label>
                        <input type="number" id="input-tombole" value="1" class="w-full bg-slate-700 p-1 rounded text-white" onchange="updatePremi()">
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 mt-4 justify-center">
                    <button onclick="annunciaPremio('CINQUINA')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-bold text-sm">📣 CINQUINA!</button>
                    <button onclick="annunciaPremio('TOMBOLA')" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded font-bold text-sm">🏆 TOMBOLA!</button>
                    <button onclick="annunciaPremio('FINE')" class="bg-slate-500 hover:bg-slate-600 px-4 py-2 rounded font-bold text-sm">⛔ FINE GIOCO</button>
                </div>
            </div>

            <div class="mt-4 flex justify-around bg-slate-800 p-2 rounded-lg border border-yellow-500/30">
                <div class="text-center">
                    <p class="text-[10px] uppercase text-slate-400">Cinquine rimaste</p>
                    <p id="display-cinquine" class="text-2xl font-black text-blue-400">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase text-slate-400">Tombole rimaste</p>
                    <p id="display-tombole" class="text-2xl font-black text-green-400">0</p>
                </div>
            </div>
        </header>

        <div id="grid-container" class="grid grid-cols-10 gap-1 md:gap-2 text-slate-900 shadow-2xl p-2 bg-slate-800 rounded-xl border border-slate-700">
        </div>
    </div>
</body>
</html>
